<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Ajiks Academy - CBT ANBK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        @media (max-width: 768px) { .nav-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="login-page" class="fixed inset-0 flex items-center justify-center bg-blue-600 z-50 p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center text-blue-800 mb-2">D'Ajiks Academy</h1>
            <p class="text-center text-gray-500 mb-6">Sistem Computer Based Test (CBT)</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nama Peserta</label>
                    <input type="text" id="input-nama" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan nama lengkap...">
                </div>
                <button onclick="mulaiUjian()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition uppercase tracking-wider">Mulai Ujian Sekarang</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-sky-400 text-white p-4 shadow-md sticky top-0 z-40">
            <div class="container mx-auto flex justify-between items-center">
                <div>
                    <h2 class="font-bold text-lg">D'Ajiks Academy</h2>
                    <p id="display-nama" class="text-sm opacity-90"></p>
                </div>
                <div class="bg-white text-blue-600 px-4 py-2 rounded-lg font-mono font-bold shadow-inner">
                    Sisa Waktu: <span id="timer">60:00</span>
                </div>
            </div>
        </header>

        <div class="container mx-auto flex flex-col md:flex-row flex-1 p-4 gap-6 mb-24">
            <main class="flex-1 bg-white rounded-lg shadow-sm p-6 overflow-y-auto min-h-[400px]">
                <div class="flex justify-between items-center border-b pb-4 mb-4">
                    <span class="bg-blue-600 text-white font-bold px-4 py-1 rounded">SOAL NO: <span id="no-soal-aktif">1</span></span>
                </div>
                <div id="soal-container" class="space-y-6">
                    <p id="teks-soal" class="text-lg text-gray-800 leading-relaxed whitespace-pre-line"></p>
                    <div id="pilihan-container" class="space-y-3"></div>
                </div>
            </main>

            <aside class="w-full md:w-64">
                <div class="bg-white p-4 rounded-lg shadow-sm border-t-4 border-blue-500 sticky top-24">
                    <h3 class="font-bold text-gray-700 mb-4 border-b pb-2">Navigasi Soal</h3>
                    <div id="grid-nomor" class="nav-grid"></div>
                </div>
            </aside>
        </div>

        <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
            <div class="container mx-auto flex justify-between items-center max-w-5xl">
                <button onclick="prevSoal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded font-bold transition flex items-center">
                    &laquo; <span class="hidden md:inline ml-1">Sebelumnya</span>
                </button>
                
                <button id="btn-ragu" onclick="toggleRagu()" class="bg-yellow-400 hover:bg-yellow-500 text-white px-6 py-2 rounded font-bold transition shadow-sm">
                    Ragu-ragu
                </button>

                <div id="nav-kanan">
                    <button id="btn-next" onclick="nextSoal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold transition flex items-center">
                        <span class="hidden md:inline mr-1">Berikutnya</span> &raquo;
                    </button>
                    <button id="btn-finish" onclick="konfirmasiSelesai()" class="hidden bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded font-bold transition shadow-md">
                        SELESAI
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <div id="result-page" class="hidden min-h-screen bg-gray-100 p-6">
        <div class="max-w-4xl mx-auto space-y-6">
            <div class="bg-white p-8 rounded-xl shadow-md text-center">
                <h2 class="text-3xl font-bold text-blue-800 mb-4">Hasil Ujian</h2>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="p-4 bg-green-100 rounded-lg"><p class="text-sm">Benar</p><p id="score-benar" class="text-2xl font-bold text-green-600">0</p></div>
                    <div class="p-4 bg-red-100 rounded-lg"><p class="text-sm">Salah</p><p id="score-salah" class="text-2xl font-bold text-red-600">0</p></div>
                    <div class="p-4 bg-blue-100 rounded-lg"><p class="text-sm">Nilai Akhir</p><p id="score-total" class="text-2xl font-bold text-blue-600">0</p></div>
                </div>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Ulangi Ujian</button>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="font-bold text-xl mb-4 border-b pb-2">Koreksi & Pembahasan</h3>
                <div id="pembahasan-list" class="space-y-8"></div>
            </div>
        </div>
    </div>

    <script>
        const bankSoal = [
            { id: 1, tanya: "Lima orang anggota club olahraga sedang berlatih di gym. Maya mengenakan tank top, Reza dan Dimas mengenakan kaos fitness. Sisanya mengenakan jaket olah raga. Sinta dan Toni memakai sepatu running, Reza memakai sepatu cross-training, sisanya memakai sepatu walking. Maya dan Reza tidak menggunakan handband sedangkan yang lain menggunakan hand band. Siapakah anggota yang menggunakan handband,memakai kaos fitness dan sepatu walking?", opsi: ["Maya", "Reza", "Sinta", "Toni", "Dimas"], kunci: 4 },
            { id: 2, tanya: "Dalam sebuah permaianan roller coaster, 8 orang pengunjung akan duduk dalam 2 kolom (kiri dan kanan). Pengaturan tempat duduk mengikuti aturan berikut: Posisi Andi dua kursi di depan Budi , Citra duduk di kolom kanna yang berseblahan dengna Andi, sedangkann Deni tidak mau duduk di belakang Andi. Eva yang pemberani duduk paling depan di kolom kiri, Fani duduk di belakang Citra, Gina tidak duduk disebelah Hani, dan Hani duduk paling belakang di kolom kanan. Jika posisi duduk dihitung dari depan ke belakang, siapakah yang duduk di kolom kiri baris ketiga?", opsi: ["Budi", "Deni", "Gina", "Andi", "Fani"], kunci: 2 },
            { id: 3, tanya: "Dalam kejuaraan balab sepeda, tujuh atlet sedang berjuang di lintasan final. Aldi yang mengalami kendala teknis harus puas berada pada urutan paling belakang. Sementara Bima yang tepat di belakang Reza terus menjaga jarak dengan putri yang berada tepat di belakangnya. Dodi terlihat konsisten mengayuh di depan Indra yang mulai terengah-engah , Indra harus rela berada di belakang Clara yang terus berusaha mempercepat lajunya. Sementara itu, Reza yang mengenakan jersey merah berhasil memimpin di posisi terdepan. Diantara pebalap siapakah posisi Clara Berada?", opsi: ["Bima dan Putri", "Putri dan Dodi", "Dodi dan Indra", "Indra dan Aldi", "Reza dan Bima"], kunci: 2 },
            { id: 4, tanya: "Ditengah kesibukan penanganan pasien, rumah sakit X mengatur jadwal jaga enam dokter spesialisnya. dr.Karla yang sangat teliti dalam menangani pasien baru saja menyelesaikan tugasnya setelah menggantika dr.bayu . Meski belum lama kembali dari pelatihan di luar kota, dr.Farah tetap siap mengambil shift terakhir hari ini. Dengan masker biru khas miliknya, dr.Dimas tampak fokus memeriksa pasien sebelum tugasnya diambil alih oleh dr.Edison. Sementara dr.Rania yang pertama bertugas hari ini telah digantikan oleh dr.Bayu. Pada urutan ke berapakah dr.Dimas mendapat giliran tugas?", opsi: ["Pertama", "Kedua", "Ketiga", "Keempat", "Kelima"], kunci: 3 },
            { id: 5, tanya: "Dalam sebuah kawasan bisnis, delapan ruko tersusun dalam dua deretan yang saling berhadapan. Butik Indah dan Kafe Senja memilih lokasi bersebelahan di sisi kiri jalan. Toko Elektronik berada tepat di sebelah Toko Buku yang berhadapan dengan Apotek yang berada disisi kanan jalan. Optik Jaya memilih lokasi berhadapan dengan Kafe Senja. Di sisi kanan, Salon Cantik tidak ingin berdekatan dengan Optik Jaya . Sementara itu, Toko Bunga yang selalu harum berhadapan dengan Butik Indah. Di antara toko manakah posisi Optik Jaya berada?", opsi: ["Toko Bunga dan Apotek", "Salon cantik dan Butik Indah", "Toko ELektronik dan Apotek", "Apotek dan Salon Cantik", "Butik indah dan Toko Bunga"], kunci: 0 },
            { id: 6, tanya: "Dalam final lari 100 meter tingkat nasional, tujuh atlet bersaing ketat dilintasan. Maya yang sedang mempersiapkan diri untuk olimpiade berhasil finis pertama. Dika yang baru pulih dari cedera masih mampu finis di posisi keempat. Sementara Toni berhasil mencapai garis finis dua posisi di belakang Dika. Alex tampil cukup baik, dengan Budi yang berhasil menyelesaikan lomba tepat setelahnya. Putri yang merupakan atlet muda harus menyelesaikan lomba setelah Toni mencapat garis finis. Bagaimana urutan kedatangan enam pelari lainnya setelah Maya?", opsi: ["Rico, Alex. Dika , Toni , Budi,Putri", "Alex, Budi, Dika, Rico, Toni ,Putri", "Rico, Alex , Dika , Budi, Toni, Putri", "Alex, Rico, DIka, Toni, Putri, Budi", "Rico, Alex, Dika, Toni, Putri, Budi"], kunci: 1 },
            { id: 7, tanya: "Di sebuah ruangan bundar, sedang berkumpul tujuh orang pejabat bank yaitu pak Dimas dan dua lainnya dari divisi audit serta Pak Tono dan satu lainnya dari divisi keuangan. Pak Budi dan Pak Hasan dari divisi yang sama dengan pak Tono selalu menggenakan pakaian formal dengan jas dan dasi. Pak Dimas dan Pak Rudi yang berasal dari divisi audit memilih mengenkan pakian adat. Pak Andi dan Pak Tono meski dari divisi berbeda sama-sama menyukai kemeja dan dasi. Pak Gani memiliki selera berpakaya sama dengan Pak Dimas. Siapakah yang berasal dari divisi keuangan tetapi menggunakan pakaian adat?", opsi: ["Pak Tono", "Pak Gani", "Pak Budi", "Pak Andi", "Pak Dimas"], kunci: 1 },
            { id: 8, tanya: "Tujuh peserta pelatihan team building sedang bermain “ Catch and Connect” dengan formasi melingkar.Bima yang merupakan supervisior marketing ingin berada dekat dengan Maya dari divisi keuangan, sama seperti Reza dari HRD yang bersikeras ingin berdekatan dengan Sinta dari divisi legal. Dina yang merupakan trainer utema dari ketujuh peserta tersebut meminta posisi khusus agar bias mengatur permainan dari antara Maya dan Sinta. Aldo yang baru bergabung di perusahaan selalu berusaha dekat dengan mentornya, BIma. Di antara siapah posisi Putri, staf magang terbaru, berada?", opsi: ["Maya dan Dina", "Aldo dan Dina", "Sinta dan Reza", "Dina dan Reza", "Reza dan Aldo"], kunci: 4 },
            { id: 9, tanya: "Dalam sebuah restoran mewah, delapan orang eksekutif muda sedang membahas rencana bisnis. Mereka duduk pada dua sisi meja panjang yang saling berhadapan. Diana yang mengenakan dress biru duduk diatara Mega dan Hadi, dan berhadapan dengan Kevin yang tampak serius mencatat setiap ide yang muncul. Yudha, seorang inestor muda, memilih duduk di sebelah Kevin untuk memudahkan diskusi, sementara Hadi yang merupakan CEO duduk berhadapan dengan Ridwan dan berada di antara Dina dan SInta. Clara yang baru bergabung dalam tim memilih duduk disampiang RIdwan. Siapakah yang duduk diantara Yudha dan Ridwan ?", opsi: ["Clara", "Mega", "Diana", "Hadi", "Kevin"], kunci: 4 },
            { id: 10, tanya: "Dalam sebuah komunitas fotografi, setiap anggota memiliki spesialisasi bidang yang berbeda. Budi menyukai fotografi landscape, tetapi tidak tertarik dengan fotografi makro. Tono dan Rini hanya focus pada fotografi landscape dan portrait. Maya aktif dismua bidang fotografi, kecuali portrait. Dimas menggeluti fotografi makro. Sementara itu, Nina yang baru saja bergabung memilih untuk fokus di fotografi makro dan portrait. Fotografer yang memiliki spesialis makro adalah . . .", opsi: ["Maya, Tono dan Dimas", "Nina , Tono dan Rini", "Dimas, Maya dan Nina", "Maya dan Nina", "Dimas dan Nina"], kunci: 2 },
            { id: 11, tanya: "Dalam system transportasi kota, ada 5 stasiun yaitu stasiun P, Q, R, S, dan T yang terhubung dengan jalur satu arah sebagai berikut. \n• P Ke Q atau R \n• Q ke R atau S; \n• R ke S atau T \n• S ke T. \nJika seorang masinis kereta ingin bepergian dari P ke T, tetapi harus melawati minimal 2 stasiun, berapa banyak rute yang mungkin di pilih?", opsi: ["0", "1", "2", "3", "4"], kunci: 4 },
            { id: 12, tanya: "Sekelompok pramuka sedang melakukan camping di hutan. Para peserta camping tersebut melewati beberapa pos yaitu Pos A, Pos B, Pos C, Pos D, dan Pos E dalam perjalanan mereka.Dari A bisa ke B atau ke C. Dari B bisa ke D. Dari C, mereka bias memilih untuk ke D atau lansung ke E. Terakhir dari pos D mereka harus k epos E. Disetiap pos mereka harus mengumpulkan satu jenis tanaman khas yang berbeda. Berapa banyak variasi koleksi tanaman yang mungkin mereka dapatkan?", opsi: ["2", "3", "4", "5", "6"], kunci: 1 },
            { id: 13, tanya: "Delapan orang mahasiswa (Andi, Budi, Citra, Dini, Eko, Fani, Gita dan Hadi) akan menaiki wahana roller coaster yang terdiri dari dua baris ke belakang. Diketahui bahwa Citra yang mudah mabuk meminta posisi duduk yang bias bergandenga dengan Fani dan diapit oleh Eko dan Budi yang berada di depan dan dibelakangnya. Andi dan Dini sangat bersemangat dan ingin duduk di baris paling depan. Hadi dan Budi lebih suka duduk di posisi paling belakang. Eko mengambil posisi di belakang Andi. Gita tidak keberatan duduk di posisi mana pun. Dimanakah posisi Gita?", opsi: ["Barisan depan, disebelah Andi", "Barisan Depan,disebelah Dini", "Barisan ke dua. Disebelah Eko", "Barisan ke tiga, disebelah Fani", "Barisan belakang, disebelah Hadi"], kunci: 2 },
            { id: 14, tanya: "Lima eksekutif oerusahaan ( CEO, CFO, CTO, CMO, COO) duduk berjajar dalam rapat panting. Aturan duduk mereka: CEO harus duduk disalah satu unjung ; CFO dan COO tidak boleh duduk bersebelahan ; CTO harus duduk disebelah CEO atau CMO ; CMO tidak boleh duduk di ujung. Jika CFO duduk di posisi kedua dari kiri, siapa yang duduk di tengah?", opsi: ["CEO", "CFO", "CTO", "CMO", "COO"], kunci: 3 },
            { id: 15, tanya: "Lima atlet ( Andi, Budi, Citra, Doni dan Eka) masing-masing menyukai satu olahraga yang berbeda ( Sepak Bola, Basket, Tenis, Renang, dan Lari). Diketahui pula bahwa ANdi dan Budi menyukai olahraga yang menggunakan bola. Citra tidak menyukai olahraga aor atau olah raga yang dilakukan sendiri. Doni adalah teman dekat atket yang menyukai Tenis, tetapi dia sendiri tidak menyukai olahraga raket. Eka sering berlatih di trek lari bersama temannya yang menyukai olahraga air. Atlet yang menyukai Basket sering bermain one-on-one dengan Citra. Andi bukan penggemar olahraga indoor. Siapakah yang menyukai olahraga renang?", opsi: ["Andi", "Budi", "Citra", "Doni", "Eka"], kunci: 4 },
            { id: 16, tanya: "Dalam sebuah acara undangan pernikahan terdapat 8 orang tamu yang duduk dalam dua baris pada kedua sisi meja. Andi berada di antara Lala dan Ari dan Berhadapan dengan Bejo. Reza berada di sebelah Bejo, sedangkan Ari berada duduk berhadapan dengan Nuri dan diantara ANdi dan Eko. Jika Nuri duduk di sebelah Anto, siapakah yang berada diantara reza dan Nuri?", opsi: ["Nuri", "Bejo", "Lala", "Andi", "Ari"], kunci: 1 },
            { id: 17, tanya: "Bu Irma sedang membuat berbagai kerajinan tangan, yaitu kerajinan tangan M, L, K O dan P. Setiap kerajinan tangan membutuhkan bahan masing-masing. Kain Flanel dibutuhkan oleh semua jenis kerajinan tangan, kain Rajut tidak akan dibutuhkan oada kerajinan tangan L dan K, sedangkan kain Spandeks hanya akan dibutuhkan pada kerajinan tangan M dan L. Bu Irma sedang mempersiapkan kain FLanel dan kain Spandek. Kerajinan tangan apakah yang dibeli bu Irma?", opsi: ["Kerajinan P", "Kerajinan O", "Kerajinan K", "Kerajinan L", "Kerajinan M"], kunci: 3 },
            { id: 18, tanya: "Pada liburan sekolah, Wisnu berlibur ke Dufan dan dia mulai berjalan melalui pintu masuk wahana. Pos A dekat dengan pintu masuk yang terhubung dengan pos B dan pos C. Setelah ia berjalan, ia melihat bahwa pos C terhubung dengan pos B, Pos D dan pos E. Kemudian pos D terhubung dengan Pos G. Sedangkan pos E terhubung dengan pos F. Pos G yang dekat dengan pintu keluar terhubung dengan pos F. Berapa maksimal pos wahana permainan yang dilewati Wisnu dalam sekali jalan?", opsi: ["3 pos", "4 pos", "5 pos", "6 pos", "7 pos"], kunci: 3 },
            { id: 19, tanya: "Pada liburan sekolah, Wisnu berlibur ke Dufan dan dia mulai berjalan melalui pintu masuk wahana. Pos A dekat dengan pintu masuk yang terhubung dengan pos B dan pos C. Setelah ia berjalan, ia melihat bahwa pos C terhubung dengan pos B, Pos D dan pos E. Kemudian pos D terhubung dengan Pos G. Sedangkan pos E terhubung dengan pos F. Pos G yang dekat dengan pintu keluar terhubung dengan pos F. Ada berapa jalur yang bias ia pilih melalui pintu masuk hingga keluar wahana?", opsi: ["3 jalur", "4 jalur", "5 jalur", "6 jalur", "7 jalur"], kunci: 1 },
            { id: 20, tanya: "Seorang petani sedang menanam bibit buah mangga dari berbagai jenis yaitu manalagi, arumanis, madu, cengkir indramayu, lalujiwo, gedong gincu, alpukat, dan golek. Empat bibit manga ditanam disamping kiri dan sisanya di samping kanan. Bibit mangga alpukat ditanam disamping kanan manalagi. Bibit mangga dedong gincu ditanam diantara manga madu dan arumanis. Bibit manga lalujiwo ditanam disebelah kiri arumanis. Bibit manga cengkir indramayu ditanam di antara golek dan lalujiwo. Buah manga jenis apa yang ditanam di sebelah kanan cengkir indramayu?", opsi: ["Alpukat", "Arum Manis", "Manalagi", "Madu", "Gedong Gincu"], kunci: 4 },
            { id: 21, tanya: "Dalam sebuah acara makan malam, Lita dan 7 orang kawannya duduk mengelilingi meja bundar. Lita duduk tepat berhadapan dengan viki. Nono berhadapan dengan Rika yang diapit oleh Desi dan Lita. Irma dan Mida duduk bersebelahan. Nono duduk diantara viki dan mida. Sita duduk berhadapan dengan Irma. Makanan ditawarkan secara bergiliran dari tangan ke tangan. Dari tangan siapakah sita akan menerima makanan?", opsi: ["Lita atau Rika", "Desi atau Viki", "Desi atau Rika", "Viki atau Nono", "Nono atau Mida"], kunci: 1 },
            { id: 22, tanya: "Di ruang budar sedang berlangsung rapat yang dihadiri oleh tujuh orang yaitu Pak Malik dan dua lainnya dari divisi pemasaran serta Pak Kris dan satu lainnya dari divisi produksi. Pak Adam dan Pak Irfan dari divisi yang sama dengan Pak Kris memiliki selera berpakayan yang sama yaitu berdasi dan berjas. Pak Malik dan Pak Deni sama-sama dari divisi pemasaran dan sama juga dalam selera berpakayan yaitu menggunakan batik. Pak Aldo dan Pa Kris dari divisi yang berbeda suka berdasi dan berkemeja. Pak Reno memiliki selera berpakayan yang sama dengan Pak Malik. Siapakah yang berasal dari divisi produksi tetapi mengenakan Batik?", opsi: ["Pak Kris", "Pak Reno", "Pak Adam", "Pak Aldo", "Pak Malik"], kunci: 1 },
            { id: 23, tanya: "Sekelompok remaja yang terdiri atas A, B, C, D, E, F sedang bersiap-siap untuk bersepeda bersama. Mereka berbaris dengan urutan sebagai berikut. F tidak berdampingan dengan D atau E, C ada di dekat E, F ada di dekat B dan B ada di sebelah C, D tidak ingin setelah A dan A bersebelahan dengan F, dan E berada di urutan terakhir. Siapakah yang berada di urutan kedua?", opsi: ["F", "D", "E", "C", "A"], kunci: 4 },
            { id: 24, tanya: "Informasi dari posisi garis melalui pada sebuah balapan, delapan mobil berada pada dua kolom berikut. A berada persis depan D, C berada persis di depan F, F berdampingan dengan E, C terletak dua urutan diatas F dan G. H berada di belakang E, sedangkan B terletak berdampingan dengan A. Pernyataan yang paling tepat adalah . . .", opsi: ["Posisi B dibelakang G", "Posisi G lebih depan dari pada E", "Posisi H berada disamping F", "Posisi F terletak di depan E", "Posisi D terletak di antara A dan E."], kunci: 4 },
            { id: 25, tanya: "Rani, Esti, Ica, Sigit, Bowo, dan Harry menonton bola dari anak tangga stadion. Masing-masing berdiri pada anak tangga yang berbeda serta setiap anak tangga memiliki nomor dari satuhingga enam, dari bawah hingga ke atas. Rani berada pada anak tangga ke empat, Ica dan Bowo pada anak tangga yang lebih rendah dari anak tangga tempati Esti berdiri. Sigit berdiri pada anak tangga yang lebih rendah dari pada anak tangga tempat ica berdiri. Manakah urutan berdiri yang tepat dari anak tangga palinf bawah hingga ke atas?", opsi: ["Esti, Hari, Bowo, Rani, Ica dan Sigit", "Ica, Sigit, Bowo, esti, harry dan rani", "Sigit, bowo, ica, rani, harry dan rani", "Harry, rani, sigit, seti, bowo dan ica", "Harry, ica, sigit, rani, bowo dan esti."], kunci: 2 }
        ];

        let indexAktif = 0;
        let jawabanSiswa = new Array(bankSoal.length).fill(null);
        let statusRagu = new Array(bankSoal.length).fill(false);
        let sisaWaktu = 60 * 60; // 60 Menit
        let timerRunning = false;

        function mulaiUjian() {
            const nama = document.getElementById('input-nama').value;
            if (!nama) return alert("Harap masukkan nama!");
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-nama').innerText = "Nama: " + nama;
            renderGrid();
            tampilkanSoal();
            if(!timerRunning) startTimer();
        }

        function tampilkanSoal() {
            const soal = bankSoal[indexAktif];
            document.getElementById('no-soal-aktif').innerText = indexAktif + 1;
            document.getElementById('teks-soal').innerText = soal.tanya;
            
            const containerOpsi = document.getElementById('pilihan-container');
            containerOpsi.innerHTML = "";

            soal.opsi.forEach((teks, i) => {
                const isChecked = jawabanSiswa[indexAktif] === i;
                const abjad = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = `flex items-center p-3 border-2 rounded-lg cursor-pointer transition ${isChecked ? 'border-blue-500 bg-blue-50' : 'hover:bg-gray-50 border-gray-200'}`;
                div.onclick = () => { jawabanSiswa[indexAktif] = i; tampilkanSoal(); renderGrid(); };
                div.innerHTML = `<div class="w-8 h-8 flex items-center justify-center rounded-full border-2 mr-4 ${isChecked ? 'bg-blue-500 text-white border-blue-500' : 'border-gray-400 text-gray-500'} font-bold">${abjad}</div><span class="text-gray-700">${teks}</span>`;
                containerOpsi.appendChild(div);
            });

            // Toggle tombol Next vs Finish
            if (indexAktif === bankSoal.length - 1) {
                document.getElementById('btn-next').classList.add('hidden');
                document.getElementById('btn-finish').classList.remove('hidden');
            } else {
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('btn-finish').classList.add('hidden');
            }
            updateNavButtons();
        }

        function renderGrid() {
            const grid = document.getElementById('grid-nomor');
            grid.innerHTML = "";
            bankSoal.forEach((_, i) => {
                let bgColor = "bg-white text-gray-600 border-gray-300";
                if (statusRagu[i]) bgColor = "bg-yellow-400 text-white border-yellow-400";
                else if (jawabanSiswa[i] !== null) bgColor = "bg-green-500 text-white border-green-500";
                if (i === indexAktif) bgColor += " ring-2 ring-blue-600 ring-offset-1";
                const btn = document.createElement('button');
                btn.className = `w-10 h-10 border rounded font-bold text-xs transition ${bgColor}`;
                btn.innerText = i + 1;
                btn.onclick = () => { indexAktif = i; tampilkanSoal(); renderGrid(); };
                grid.appendChild(btn);
            });
        }

        function nextSoal() { if (indexAktif < bankSoal.length - 1) { indexAktif++; tampilkanSoal(); renderGrid(); } }
        function prevSoal() { if (indexAktif > 0) { indexAktif--; tampilkanSoal(); renderGrid(); } }
        function toggleRagu() { statusRagu[indexAktif] = !statusRagu[indexAktif]; renderGrid(); updateNavButtons(); }

        function updateNavButtons() {
            const btnRagu = document.getElementById('btn-ragu');
            btnRagu.innerText = statusRagu[indexAktif] ? "Selesai Ragu" : "Ragu-ragu";
            btnRagu.className = statusRagu[indexAktif] ? "bg-yellow-600 text-white px-6 py-2 rounded font-bold" : "bg-yellow-400 text-white px-6 py-2 rounded font-bold";
        }

        function startTimer() {
            timerRunning = true;
            const display = document.getElementById('timer');
            const interval = setInterval(() => {
                let m = Math.floor(sisaWaktu / 60);
                let s = sisaWaktu % 60;
                display.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if (--sisaWaktu < 0) { clearInterval(interval); hitungHasil(); }
            }, 1000);
        }

        function konfirmasiSelesai() {
            if(confirm("Apakah Anda yakin ingin mengakhiri ujian?")) hitungHasil();
        }

        function hitungHasil() {
            let benar = 0;
            let salah = 0;
            const listPembahasan = document.getElementById('pembahasan-list');
            listPembahasan.innerHTML = "";

            bankSoal.forEach((soal, i) => {
                const isBenar = jawabanSiswa[i] === soal.kunci;
                if (isBenar) benar++; else salah++;

                const item = document.createElement('div');
                item.className = `p-4 border-l-4 ${isBenar ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                item.innerHTML = `
                    <p class="font-bold">No. ${i+1}: ${isBenar ? '✅ Benar' : '❌ Salah'}</p>
                    <p class="text-gray-700 my-2">${soal.tanya}</p>
                    <p class="text-sm"><b>Jawaban Anda:</b> ${jawabanSiswa[i] !== null ? soal.opsi[jawabanSiswa[i]] : '<span class="text-red-600">Tidak menjawab</span>'}</p>
                    <p class="text-sm"><b>Kunci Jawaban:</b> ${soal.opsi[soal.kunci]}</p>
                `;
                listPembahasan.appendChild(item);
            });

            document.getElementById('score-benar').innerText = benar;
            document.getElementById('score-salah').innerText = salah;
            document.getElementById('score-total').innerText = Math.round((benar / bankSoal.length) * 100);

            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
